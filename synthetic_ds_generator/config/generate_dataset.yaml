defaults:
  - _self_
  - generator: generate.yaml
  #- override hydra/launcher: submitit_slurm
  - override hydra/hydra_logging: disabled  
  - override hydra/job_logging: disabled  

seed: 12345

output_dir: ../rename_after_generation/
name: no_name
run_name: ${hydra:job.num}
n_samples: 10
n_vars: 5
nonlinear_proba: 0.0

# General parameters for dataset generation they are not used but are placeholders so we can access the params via command line
nonstationary_change: 0.0
nl_mode: power_set
power_dist: [0.5,1,1,2]
spline_samples: 4


link_mask_path: null
nl_mask_path: null
instant_link_mask_path: null
instant_nl_mask_path: null



